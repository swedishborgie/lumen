name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

# Opt into Node.js 24 ahead of the June 2026 forced migration.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Least-privilege defaults; individual jobs add what they need.
permissions:
  contents: write  # create GitHub Releases and upload release assets
  packages: write  # push container images to GHCR

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Build and push the Docker image to GHCR.
  # ─────────────────────────────────────────────────────────────────────────────
  build-docker:
    name: Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        # Strip the leading 'v' from the tag name: v0.2.0 → 0.2.0
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (labwc)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ghcr.io/swedishborgie/lumen:${{ steps.version.outputs.VERSION }}-labwc
            ghcr.io/swedishborgie/lumen:latest-labwc
          build-args: |
            LUMEN_VERSION=${{ steps.version.outputs.VERSION }}
            DESKTOP=labwc
          # cargo-chef separates the long-lived dependency layer from the
          # short-lived application layer.  The GHA BuildKit cache preserves
          # both across runs; only source changes trigger a recompile.
          cache-from: type=gha,scope=lumen-docker
          cache-to: type=gha,scope=lumen-docker,mode=max

      - name: Build and push (kde)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ghcr.io/swedishborgie/lumen:${{ steps.version.outputs.VERSION }}
            ghcr.io/swedishborgie/lumen:latest
            ghcr.io/swedishborgie/lumen:${{ steps.version.outputs.VERSION }}-kde
            ghcr.io/swedishborgie/lumen:latest-kde
          build-args: |
            LUMEN_VERSION=${{ steps.version.outputs.VERSION }}
            DESKTOP=kde
          # Reuses the planner, builder, and shared runtime layers cached by the
          # labwc step above; only the DESKTOP-specific apt-get layer is rebuilt.
          cache-from: type=gha,scope=lumen-docker
          cache-to: type=gha,scope=lumen-docker,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # Build the .deb package and attach it to the GitHub Release.
  # ─────────────────────────────────────────────────────────────────────────────
  build-deb:
    name: Debian Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build .deb
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.packages
          # Target only the deb-builder stage; skip rpm-builder entirely.
          target: deb-builder
          load: true
          tags: lumen-deb:build
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION }}
          # Shares scope with build-rpm so the common planner stage is cached
          # by whichever job runs first and reused by the other.
          cache-from: type=gha,scope=lumen-packages
          cache-to: type=gha,scope=lumen-packages,mode=max

      - name: Extract .deb artifact
        run: |
          cid=$(docker create lumen-deb:build)
          mkdir -p dist
          docker cp "$cid:/packages/" dist/
          docker rm "$cid"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Use || true so the step succeeds even if the release was already
        # created by a parallel job (e.g. build-rpm).
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
          || true

      - name: Upload .deb to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" dist/packages/*.deb --clobber

  # ─────────────────────────────────────────────────────────────────────────────
  # Build the .rpm package and attach it to the GitHub Release.
  # ─────────────────────────────────────────────────────────────────────────────
  build-rpm:
    name: Fedora Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build .rpm
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.packages
          # Target only the rpm-builder stage; skip deb-builder entirely.
          target: rpm-builder
          load: true
          tags: lumen-rpm:build
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION }}
          cache-from: type=gha,scope=lumen-packages
          cache-to: type=gha,scope=lumen-packages,mode=max

      - name: Extract .rpm artifact
        run: |
          cid=$(docker create lumen-rpm:build)
          mkdir -p dist
          docker cp "$cid:/packages/" dist/
          docker rm "$cid"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
          || true

      - name: Upload .rpm to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" dist/packages/*.rpm --clobber
