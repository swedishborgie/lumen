title: Lumen
description: A Wayland compositor that streams your Linux desktop to a web browser over WebRTC — no client software required.
url: "https://github.com/pages/lumen/lumen"

remote_theme: just-the-docs/just-the-docs

# Logo in the navigation pane
logo: "/assets/images/lumen.svg"

# Just the Docs configuration
color_scheme: dark

# Search
search_enabled: true

# Footer
footer_content: "Lumen is open source software."

# Navigation
nav_sort: order

# Aux links (top-right)
aux_links:
  "GitHub":
  - "https://github.com/swedishborgie/lumen"
aux_links_new_tab: true

# Callouts
callouts:
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green
  warning:
    title: Warning
    color: yellow
  important:
    title: Important
    color: red

# Enable copy button on code blocks
enable_copy_code_button: true

# Mermaid diagrams
mermaid:
  version: "10"

plugins:
- jekyll-seo-tag
