<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#000000">
  <title>Lumen</title>
  <link rel="icon" href="images/lumen.svg" type="image/svg+xml">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="video-container">
    <video id="video" autoplay playsinline muted tabindex="0" controlslist="nopictureinpicture" disablepictureinpicture></video>
    <div id="splash">
      <img src="images/logo.png" alt="Lumen logo">
      <span>LUMEN</span>
      <p id="splash-status"></p>
    </div>
    <canvas id="cursor-canvas"></canvas>
    <canvas id="perf-canvas"></canvas>
  </div>

  <div id="tray-trigger" title="Open Controls"></div>

  <div id="fullscreen-hint">Hold <kbd>Esc</kbd> to exit fullscreen</div>

  <div id="tray">
    <div id="controls">
      <button id="btn-connect-toggle">Connect</button>
      <button id="btn-fullscreen" disabled title="Enter fullscreen mode. In Chromium, system keys like Escape and Super are captured for the compositor.">⛶ Fullscreen</button>
    </div>
    <div id="status">Idle</div>
    <div id="display-section">
      <div class="tray-label">Display<i class="help-icon" title="Controls the compositor output resolution. Auto follows your browser window; Fixed locks to a specific size.">ⓘ</i></div>
      <div id="display-mode-toggle">
        <button id="display-auto" class="active" title="Automatically resize the compositor to match your browser window.">Auto</button>
        <button id="display-fixed" title="Lock the compositor to a fixed resolution regardless of browser window size.">Fixed</button>
      </div>
      <div id="ui-scale-row" class="tray-row">
        <span class="tray-label">Match browser UI scale<i class="help-icon" title="Scales the compositor output to match your browser's device pixel ratio, improving sharpness on HiDPI and Retina displays.">ⓘ</i></span>
        <label class="toggle-switch">
          <input type="checkbox" id="ui-scale-toggle">
          <span class="toggle-track"></span>
        </label>
      </div>
      <div id="display-fixed-controls" style="display:none">
        <div id="display-presets">
          <button id="display-preset-720p">1280×720</button>
          <button id="display-preset-1080p">1920×1080</button>
        </div>
        <div id="display-custom">
          <input type="number" id="display-custom-w" min="320" max="7680" step="2" placeholder="W">
          <span class="sep">×</span>
          <input type="number" id="display-custom-h" min="200" max="4320" step="2" placeholder="H">
          <button id="display-apply">Apply</button>
        </div>
      </div>
    </div>
    <div id="stream-settings-section">
      <div class="tray-label">Stream<i class="help-icon" title="Configure the video codec and frame rate. Changes apply on the next connection. Codec and FPS controls are disabled while connected.">ⓘ</i></div>
      <div class="tray-row">
        <span class="tray-label">Codec</span>
        <select id="stream-codec-select">
          <option value="h264" selected>H.264</option>
        </select>
      </div>
      <div class="tray-row">
        <span class="tray-label">Frame Rate</span>
        <select id="stream-fps-select">
          <option value="15">15 fps</option>
          <option value="30" selected>30 fps</option>
          <option value="60">60 fps</option>
          <option value="custom">Custom…</option>
        </select>
        <input type="number" id="stream-fps-custom" min="1" max="240" style="display:none;width:4em" placeholder="FPS">
      </div>
    </div>
    <div id="clipboard-section">
      <div class="tray-label">Clipboard<i class="help-icon" title="Paste text here to send it to the compositor clipboard. Updates automatically when the compositor clipboard changes.">ⓘ</i></div>
      <textarea id="clipboard-input" placeholder="Paste or type here to send to compositor. Updated automatically when compositor clipboard changes." rows="5" spellcheck="false"></textarea>
    </div>
    <div id="gamepad-section">
      <div class="tray-label">Controllers<i class="help-icon" title="Connected gamepads are forwarded to the compositor. Plug in a controller and it will appear here.">ⓘ</i></div>
      <div id="gamepad-list"><span class="gamepad-none">No controllers detected</span></div>
    </div>
    <div id="input-section">
      <div class="tray-row">
        <span class="tray-label">Mac Mode<i class="help-icon" title="Swaps the Command (⌘) and Control keys so Mac shortcuts like ⌘C work as Ctrl+C in Linux apps.">ⓘ</i></span>
        <label class="toggle-switch">
          <input type="checkbox" id="mac-mode-toggle">
          <span class="toggle-track"></span>
        </label>
      </div>
    </div>
    <div id="stats-section">
      <div class="tray-row">
        <span class="tray-label">Performance overlay<i class="help-icon" title="Shows a real-time overlay with frame rate, bitrate, and latency statistics.">ⓘ</i></span>
        <div class="tray-row-actions">
          <button id="btn-copy-metrics" class="tray-action-btn" title="Copy metrics to clipboard" style="display:none">Copy</button>
          <label class="toggle-switch">
            <input type="checkbox" id="perf-toggle">
            <span class="toggle-track"></span>
          </label>
        </div>
      </div>
      <div class="tray-row">
        <span class="tray-label">Debug logging<i class="help-icon" title="Writes detailed connection and protocol events to the browser console for troubleshooting.">ⓘ</i></span>
        <label class="toggle-switch">
          <input type="checkbox" id="debug-toggle">
          <span class="toggle-track"></span>
        </label>
      </div>
      <div id="debug-level-row" class="tray-row" style="display:none">
        <span class="tray-label">Log level<i class="help-icon" title="Controls how much detail is written to the browser console. Error shows the least; Verbose shows the most.">ⓘ</i></span>
        <select id="debug-level">
          <option value="1">Error</option>
          <option value="2">Warning</option>
          <option value="3" selected>Info</option>
          <option value="4">Debug</option>
          <option value="5">Verbose</option>
        </select>
      </div>
    </div>
  </div>

  <script type="module">
    import { LumenClient } from './lumen-client.mjs';
    import { LumenUI }     from './lumen-ui.mjs';

    const client = new LumenClient();
    new LumenUI(client, {
      video:          document.getElementById('video'),
      videoContainer: document.getElementById('video-container'),
      cursorCanvas:   document.getElementById('cursor-canvas'),
      perfCanvas:     document.getElementById('perf-canvas'),
      perfToggle:     document.getElementById('perf-toggle'),
      btnCopyMetrics: document.getElementById('btn-copy-metrics'),
      debugToggle:    document.getElementById('debug-toggle'),
      debugLevel:     document.getElementById('debug-level'),
      debugLevelRow:  document.getElementById('debug-level-row'),
      btnConnect:     document.getElementById('btn-connect-toggle'),
      macModeToggle:  document.getElementById('mac-mode-toggle'),
      btnFullscreen:  document.getElementById('btn-fullscreen'),
      statusEl:       document.getElementById('status'),
      fullscreenHint: document.getElementById('fullscreen-hint'),
      clipboardInput: document.getElementById('clipboard-input'),
      splash:         document.getElementById('splash'),
      splashStatus:   document.getElementById('splash-status'),
      displayAuto:          document.getElementById('display-auto'),
      displayFixed:         document.getElementById('display-fixed'),
      displayFixedControls: document.getElementById('display-fixed-controls'),
      displayPreset720p:    document.getElementById('display-preset-720p'),
      displayPreset1080p:   document.getElementById('display-preset-1080p'),
      displayCustomW:       document.getElementById('display-custom-w'),
      displayCustomH:       document.getElementById('display-custom-h'),
      displayApply:         document.getElementById('display-apply'),
      uiScaleRow:           document.getElementById('ui-scale-row'),
      uiScaleToggle:        document.getElementById('ui-scale-toggle'),
      gamepadList:          document.getElementById('gamepad-list'),
    });

    // Auto-connect on page load.
    client.connect();

    // Register service worker (required for PWA installability).
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }

    // Tray toggle logic
    const tray = document.getElementById('tray');
    const trigger = document.getElementById('tray-trigger');
    trigger.onclick = (e) => {
      tray.classList.toggle('open');
      trigger.classList.toggle('tray-open');
      e.stopPropagation();
    };
    // Close tray if clicking outside (mouse)
    document.addEventListener('click', (e) => {
      if (!tray.contains(e.target) && e.target !== trigger) {
        tray.classList.remove('open');
        trigger.classList.remove('tray-open');
      }
    });
    // Close tray if touching outside (touch — click is suppressed by preventDefault in video handlers)
    document.addEventListener('touchstart', (e) => {
      if (!tray.contains(e.target) && e.target !== trigger) {
        tray.classList.remove('open');
        trigger.classList.remove('tray-open');
      }
    }, { passive: true });
  </script>
</body>
</html>
