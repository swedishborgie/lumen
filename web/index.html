<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumen</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111; color: #eee; font-family: sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 12px; gap: 8px; }
    #video-container {
      width: 100%;
      max-width: 1920px;
      aspect-ratio: 16 / 9;
      background: #000;
      flex-shrink: 0;
      max-height: calc(100vh - 120px);
    }
    video {
      width: 100%; height: 100%;
      display: block;
      object-fit: contain;
      background: #000;
      cursor: none;
      outline: none;
    }
    #stats {
      margin-top: 8px; padding: 6px 10px; border-radius: 4px;
      background: #1a1a1a; color: #0f0;
      font: 12px/1.6 monospace; white-space: pre;
      width: 100%; max-width: 1920px;
    }
    #controls { margin-top: 10px; display: flex; gap: 10px; }
    button { padding: 8px 20px; border: none; border-radius: 4px; background: #444; color: #eee; cursor: pointer; font-size: 14px; }
    button:hover { background: #555; }
    button:disabled { opacity: 0.4; cursor: default; }
    #status { margin-top: 8px; font-size: 13px; color: #aaa; }
  </style>
</head>
<body>
  <div id="video-container">
    <video id="video" autoplay playsinline muted tabindex="0"></video>
  </div>
  <div id="stats">No stats yet</div>
  <div id="controls">
    <button id="btn-connect">Connect</button>
    <button id="btn-disconnect" disabled>Disconnect</button>
  </div>
  <div id="status">Idle</div>

  <script type="module">
    import { LumenClient } from './lumen-client.js';
    import { LumenUI }     from './lumen-ui.js';

    const client = new LumenClient();
    new LumenUI(client, {
      video:         document.getElementById('video'),
      stats:         document.getElementById('stats'),
      btnConnect:    document.getElementById('btn-connect'),
      btnDisconnect: document.getElementById('btn-disconnect'),
      statusEl:      document.getElementById('status'),
    });
  </script>
</body>
</html>
